<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Locations - Weather</title>
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  
  <!-- CSS -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/accessibility.css">
</head>
<body>
  <a href="#main-content" class="skip-nav focus-ring">Skip to main content</a>

  <div class="app-layout">
    <!-- Sidebar Navigation -->
    <nav class="sidebar" aria-label="Main Navigation">
      <a href="index.html" class="sidebar-brand focus-ring" aria-label="Weather Home">
        <div class="sidebar-brand-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.5 19C19.9853 19 22 16.9853 22 14.5C22 12.1325 20.1772 10.2017 17.8546 10.0156C17.3828 6.61111 14.4682 4 11 4C7.13401 4 4 7.13401 4 11C4 11.2335 4.01146 11.4645 4.03362 11.692C1.78208 12.2855 0 14.4332 0 17C0 19.7614 2.23858 22 5 22H17.5V19Z" fill="currentColor"/>
          </svg>
        </div>
        <div class="sidebar-brand-text">
          <span class="sidebar-brand-name">Weather</span>
          <span class="sidebar-brand-tagline">Calm Forecasting</span>
        </div>
      </a>

      <div class="nav-list" role="list">
        <a href="index.html" class="nav-link focus-ring" role="listitem">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <rect x="3" y="3" width="7" height="7" rx="1" />
            <rect x="14" y="3" width="7" height="7" rx="1" />
            <rect x="14" y="14" width="7" height="7" rx="1" />
            <rect x="3" y="14" width="7" height="7" rx="1" />
          </svg>
          Dashboard
        </a>
        <a href="locations.html" class="nav-link nav-link--active focus-ring" role="listitem" aria-current="page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M9 20L3 17V4L9 7M9 20L15 17M9 20V7M15 17L21 20V7L15 4M15 17V4M9 7L15 4" />
          </svg>
          Map
        </a>
        <a href="forecast.html" class="nav-link focus-ring" role="listitem">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M12 8V12L15 15M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z" />
          </svg>
          History
        </a>
        <a href="settings.html" class="nav-link focus-ring" role="listitem">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
            <path d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
          </svg>
          Settings
        </a>
      </div>

      <!-- <div class="sidebar-footer">
        <button class="btn btn-upgrade focus-ring">Upgrade to Pro</button>
      </div> -->
    </nav>

    <!-- Main Content Area -->
    <main id="main-content" class="main-content" tabindex="-1">
      <div class="main-inner">
        
        <header class="page-header">
          <h1>Location Search</h1>
          <p>Find and manage your serene forecasting destinations.</p>
        </header>

        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <circle cx="11" cy="11" r="8" />
            <path d="M21 21l-4.35-4.35" />
          </svg>
          <input type="text" placeholder="Search cities, zip codes, or airports..." aria-label="Search for a location" class="focus-ring">
          <button class="btn btn-primary focus-ring">SEARCH</button>
        </div>

        <section aria-labelledby="primary-loc-heading">
          <h2 id="primary-loc-heading" class="sr-only">Primary Location</h2>
          
          <div class="primary-location">
            <div class="primary-location-info">
              <div class="primary-location-badge">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/>
                </svg>
                Current Location
              </div>
              <h3 class="primary-location-city">Seattle, WA</h3>
              <p class="primary-location-condition">Light Rain • Expect clearing by 4 PM</p>
            </div>
            
            <div class="primary-location-weather">
              <div class="primary-location-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                  <path d="M20 16.58A5 5 0 0 0 18 7h-1.26A8 8 0 1 0 4 15.25" />
                  <path d="M16 20l-4-4M12 20l-4-4M8 20l-4-4" />
                </svg>
              </div>
              <div class="primary-location-temp">54°</div>
            </div>
          </div>
        </section>

        <section aria-labelledby="saved-cities-heading">
          <div class="section-heading">
            <h2 id="saved-cities-heading">Saved Cities</h2>
            <a href="#" class="section-action focus-ring">
              EDIT LIST
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7" />
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z" />
              </svg>
            </a>
          </div>

          <div class="city-grid">
            
            <button class="card city-card focus-ring" aria-label="Kyoto, Japan. 72 degrees, clear. High 75, Low 60.">
              <div class="city-card-header">
                <div>
                  <div class="city-card-name">Kyoto</div>
                  <div class="city-card-country">Japan</div>
                </div>
                <div class="city-card-icon" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="12" cy="12" r="5" />
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                  </svg>
                </div>
              </div>
              <div class="city-card-temps">
                <div class="city-card-temp">72°</div>
                <div class="city-card-hilo">H: 75°<br>L: 60°</div>
              </div>
            </button>

            <button class="card city-card focus-ring" aria-label="Reykjavik, Iceland. 41 degrees, overcast. High 43, Low 38.">
              <div class="city-card-header">
                <div>
                  <div class="city-card-name">Reykjavik</div>
                  <div class="city-card-country">Iceland</div>
                </div>
                <div class="city-card-icon" style="color: var(--color-info);" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M6.999 12C6.999 9.239 9.238 7 12 7C14.761 7 17 9.239 17 12C17 12.046 16.999 12.093 16.997 12.139C16.999 12.204 17 12.269 17 12.333C17 14.911 14.911 17 12.333 17H6.999C4.238 17 2 14.761 2 12C2 9.239 4.238 7 6.999 7ZM12 5C8.134 5 5 8.134 5 12C5 12.139 5.011 12.277 5.033 12.413C2.756 12.833 1 14.717 1 17.001C1 19.762 3.239 22 6 22H17.333C20.463 22 23 19.462 23 16.333C23 13.567 21.022 11.26 18.397 10.778C17.653 7.42 15.08 5 12 5Z"/>
                  </svg>
                </div>
              </div>
              <div class="city-card-temps">
                <div class="city-card-temp">41°</div>
                <div class="city-card-hilo">H: 43°<br>L: 38°</div>
              </div>
            </button>

            <button class="card city-card focus-ring" aria-label="Sedona, Arizona, USA. 88 degrees, hot and sunny. High 92, Low 65.">
              <div class="city-card-header">
                <div>
                  <div class="city-card-name">Sedona</div>
                  <div class="city-card-country">Arizona, USA</div>
                </div>
                <div class="city-card-icon" style="color: var(--color-danger);" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <circle cx="12" cy="12" r="5" />
                    <path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" />
                  </svg>
                </div>
              </div>
              <div class="city-card-temps">
                <div class="city-card-temp">88°</div>
                <div class="city-card-hilo">H: 92°<br>L: 65°</div>
              </div>
            </button>

            <button class="card city-card--add focus-ring" aria-label="Add a new location">
              <div class="add-icon" aria-hidden="true">+</div>
              <span>Add Location</span>
            </button>

          </div>
        </section>

      </div>
    </main>
  </div>

  <script src="js/weather-data.js"></script>
  <script src="js/accessibility.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
